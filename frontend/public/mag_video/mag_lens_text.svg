<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" style="background-color: #f8fafc;">
  <text x="50" y="80" font-family="serif" font-size="14" fill="#64748b">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor.</text>
  <text x="50" y="100" font-family="serif" font-size="14" fill="#64748b">Incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud.</text>
  <text x="50" y="120" font-family="serif" font-size="14" fill="#64748b">Exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</text>
  <text x="50" y="180" font-family="serif" font-size="14" fill="#64748b">Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu.</text>
  <text x="50" y="200" font-family="serif" font-size="14" fill="#64748b">Fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident.</text>
  
  <line x1="380" y1="280" x2="480" y2="380" stroke="#334155" stroke-width="25" stroke-linecap="round" />
  <line x1="380" y1="280" x2="480" y2="380" stroke="#475569" stroke-width="15" stroke-linecap="round" />
  
  <circle cx="300" cy="200" r="110" fill="none" stroke="#94a3b8" stroke-width="25" />
  <circle cx="300" cy="200" r="120" fill="none" stroke="#64748b" stroke-width="5" />
  
  <clipPath id="lens">
    <circle cx="300" cy="200" r="100" />
  </clipPath>
  
  <g clip-path="url(#lens)">
    <circle cx="300" cy="200" r="100" fill="#ffffff" />
    <circle cx="280" cy="180" r="80" fill="#f1f5f9" opacity="0.5" />
    <text x="180" y="180" font-family="serif" font-size="42" fill="#0f172a" font-weight="bold">Duis aute</text>
    <text x="160" y="230" font-family="serif" font-size="42" fill="#0f172a" font-weight="bold">irure dolor</text>
  </g>
</svg>
