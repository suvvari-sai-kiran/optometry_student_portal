<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <!-- Small Diameter -->
  <g transform="translate(150, 150)">
    <circle cx="50" cy="50" r="50" fill="rgba(251, 191, 36, 0.2)" stroke="#fbbf24" stroke-width="2"/>
    <path d="M0 50 Q50 30 100 50 Q50 70 0 50" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <text x="50" y="130" fill="#fbbf24" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Small Diameter</text>
    <text x="50" y="155" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">Thinner Result</text>
  </g>
  
  <text x="400" y="225" fill="white" font-family="Arial" font-size="40" text-anchor="middle" font-weight="bold">→</text>
  
  <!-- Large Diameter -->
  <g transform="translate(500, 100)">
    <circle cx="100" cy="100" r="100" fill="rgba(248, 113, 113, 0.2)" stroke="#f87171" stroke-width="2"/>
    <path d="M0 100 Q100 10 200 100 Q100 190 0 100" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
    <text x="100" y="230" fill="#f87171" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">Large Diameter</text>
    <text x="100" y="255" fill="#94a3b8" font-family="Arial" font-size="14" text-anchor="middle">MUCH Thicker result (D² effect)</text>
  </g>
</svg>
