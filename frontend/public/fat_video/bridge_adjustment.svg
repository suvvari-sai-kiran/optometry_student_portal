<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <g transform="translate(400, 225)">
    <!-- Bridge & Nose Pads -->
    <path d="M-100 0 Q0 -80 100 0" fill="none" stroke="#6366f1" stroke-width="4"/>
    <path d="M-40 20 Q-50 60 -40 80" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <path d="M40 20 Q50 60 40 80" fill="rgba(99, 102, 241, 0.2)" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Arrows showing adjustment -->
    <path d="M-80 50 L-120 50" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M80 50 L120 50" stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)"/>
    
    <text y="140" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">BRIDGE & NOSE PAD ADJUSTMENT</text>
    <text y="170" fill="#94a3b8" font-family="Arial" font-size="16" text-anchor="middle">Equalizing pressure for stability</text>
  </g>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24" />
    </marker>
  </defs>
</svg>
