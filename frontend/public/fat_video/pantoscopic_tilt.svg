<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="450" fill="#0f172a"/>
  
  <g transform="translate(400, 200)">
    <!-- Side View Face (Simplified) -->
    <path d="M-50 -150 Q50 -150 50 -100 L50 0 Q50 100 -50 150" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
    <path d="M50 -20 L80 -20 L70 10 L50 10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/> <!-- Eye -->
    
    <!-- Spectacle Frame (Side View with Tilt) -->
    <g transform="rotate(10, 50, -40)">
      <rect x="50" y="-80" width="10" height="150" fill="#6366f1" opacity="0.8"/>
      <line x1="50" y1="-40" x2="-200" y2="-40" stroke="#6366f1" stroke-width="6"/>
    </g>
    
    <!-- Tilt Angle Indicator -->
    <path d="M70 -100 Q100 -50 70 50" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5"/>
    <text x="110" y="0" fill="#ef4444" font-family="Arial" font-size="16" font-weight="bold">8\u00B0-12\u00B0 TILT</text>
    
    <text y="200" fill="white" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">PANTOSCOPIC TILT</text>
    <text y="230" fill="#94a3b8" font-family="Arial" font-size="16" text-anchor="middle">Tilting toward the cheeks for optimal vision</text>
  </g>
</svg>
