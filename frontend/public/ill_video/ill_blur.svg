<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" style="background-color: #f8fafc;">
  <g clip-path="url(#left-half)">
    <text x="150" y="200" font-family="serif" font-size="64" fill="#0f172a" text-anchor="middle" font-weight="bold">E</text>
    <text x="150" y="260" font-family="serif" font-size="48" fill="#0f172a" text-anchor="middle">F P</text>
  </g>
  
  <g clip-path="url(#right-half)">
    <rect x="300" y="0" width="300" height="400" fill="#ffffff" opacity="0.5" />
    <text x="450" y="200" font-family="serif" font-size="64" fill="#64748b" text-anchor="middle" font-weight="bold" filter="blur(6px)">E</text>
    <text x="450" y="260" font-family="serif" font-size="48" fill="#64748b" text-anchor="middle" filter="blur(8px)">F P</text>
    <circle cx="450" cy="230" r="150" fill="#ffffff" opacity="0.4" filter="blur(20px)" />
  </g>
  
  <line x1="300" y1="0" x2="300" y2="400" stroke="#cbd5e1" stroke-width="4" stroke-dasharray="10 10" />
  
  <clipPath id="left-half">
    <rect x="0" y="0" width="300" height="400" />
  </clipPath>
  <clipPath id="right-half">
    <rect x="300" y="0" width="300" height="400" />
  </clipPath>
</svg>
