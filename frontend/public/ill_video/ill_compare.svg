<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" style="background-color: #f1f5f9;">
  <rect x="0" y="0" width="300" height="400" fill="#f8fafc" />
  <circle cx="150" cy="150" r="40" fill="#facc15" opacity="0.8" />
  <rect x="100" y="250" width="100" height="80" rx="4" fill="#334155" />
  <text x="150" y="380" font-family="sans-serif" font-size="20" fill="#64748b" text-anchor="middle">Normal Lighting</text>

  <rect x="300" y="0" width="300" height="400" fill="#ffffff" />
  <circle cx="450" cy="150" r="120" fill="#fef08a" opacity="0.6" filter="blur(10px)" />
  <circle cx="450" cy="150" r="60" fill="#ffffff" />
  <rect x="400" y="250" width="100" height="80" rx="4" fill="#94a3b8" />
  <text x="450" y="380" font-family="sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Over-illumination</text>
  
  <line x1="300" y1="0" x2="300" y2="400" stroke="#cbd5e1" stroke-width="4" stroke-dasharray="10 10" />
</svg>
