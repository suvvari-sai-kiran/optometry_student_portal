<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" style="background-color: white;">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="black" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="white" />
  <rect x="100" y="100" width="400" height="400" fill="url(#grid)" stroke="black" stroke-width="2" />
  <circle cx="300" cy="300" r="6" fill="black" />
</svg>
